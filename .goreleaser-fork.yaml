version: 2

# Simplified goreleaser config for fork builds
# Publishes: GitHub Release, GHCR Docker image, Homebrew tap

before:
  hooks:
    - ./scripts/completions.sh
    - ./scripts/manpages.sh

builds:
  - id: all-builds
    env:
      - CGO_ENABLED=0
    binary: infisical
    ldflags:
      - -X github.com/Infisical/infisical-merge/packages/util.CLI_VERSION={{ .Version }}
    flags:
      - -trimpath
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format_overrides:
      - goos: windows
        format: zip
    files:
      - README*
      - LICENSE*
      - manpages/*
      - completions/*

release:
  replace_existing_draft: true
  mode: "replace"

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Version }}-devel"

dockers:
  - dockerfile: docker/alpine
    goos: linux
    goarch: amd64
    use: buildx
    ids:
      - all-builds
    image_templates:
      - "ghcr.io/{{ .Env.DOCKER_REPO_OWNER }}/infisical-cli:{{ .Version }}-amd64"
      - "ghcr.io/{{ .Env.DOCKER_REPO_OWNER }}/infisical-cli:latest-amd64"
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
  - dockerfile: docker/alpine
    goos: linux
    goarch: arm64
    use: buildx
    ids:
      - all-builds
    image_templates:
      - "ghcr.io/{{ .Env.DOCKER_REPO_OWNER }}/infisical-cli:{{ .Version }}-arm64"
      - "ghcr.io/{{ .Env.DOCKER_REPO_OWNER }}/infisical-cli:latest-arm64"
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/{{ .Env.DOCKER_REPO_OWNER }}/infisical-cli:{{ .Version }}"
    image_templates:
      - "ghcr.io/{{ .Env.DOCKER_REPO_OWNER }}/infisical-cli:{{ .Version }}-amd64"
      - "ghcr.io/{{ .Env.DOCKER_REPO_OWNER }}/infisical-cli:{{ .Version }}-arm64"
  - name_template: "ghcr.io/{{ .Env.DOCKER_REPO_OWNER }}/infisical-cli:latest"
    image_templates:
      - "ghcr.io/{{ .Env.DOCKER_REPO_OWNER }}/infisical-cli:latest-amd64"
      - "ghcr.io/{{ .Env.DOCKER_REPO_OWNER }}/infisical-cli:latest-arm64"

brews:
  # latest formula — `brew install YewFence/infisical-cli/infisical`
  - name: infisical
    repository:
      owner: "{{ .Env.HOMEBREW_TAP_OWNER }}"
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: "YewFence"
      email: noreply@github.com
    directory: Formula
    homepage: "https://github.com/YewFence/infisical-cli"
    description: "Infisical CLI (yewfix fork)"
    install: |-
      bin.install "infisical"
      bash_completion.install "completions/infisical.bash" => "infisical"
      zsh_completion.install "completions/infisical.zsh" => "_infisical"
      fish_completion.install "completions/infisical.fish"
      man1.install "manpages/infisical.1.gz"
  # pinned formula — `brew install YewFence/infisical-cli/infisical@0.38.3-yewfix`
  - name: "infisical@{{ .Version }}"
    repository:
      owner: "{{ .Env.HOMEBREW_TAP_OWNER }}"
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: "YewFence"
      email: noreply@github.com
    directory: Formula
    homepage: "https://github.com/YewFence/infisical-cli"
    description: "Infisical CLI (yewfix fork)"
    install: |-
      bin.install "infisical"
      bash_completion.install "completions/infisical.bash" => "infisical"
      zsh_completion.install "completions/infisical.zsh" => "_infisical"
      fish_completion.install "completions/infisical.fish"
      man1.install "manpages/infisical.1.gz"
