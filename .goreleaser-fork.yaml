version: 2

# Simplified goreleaser config for fork builds
# Publishes: GitHub Release, GHCR Docker image, Homebrew tap

before:
  hooks:
    - ./scripts/completions.sh
    - ./scripts/manpages.sh

builds:
  - id: all-builds
    env:
      - CGO_ENABLED=0
    binary: infisical
    ldflags:
      - -X github.com/Infisical/infisical-merge/packages/util.CLI_VERSION={{ .Version }}
    flags:
      - -trimpath
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README*
      - LICENSE*
      - manpages/*
      - completions/*

release:
  replace_existing_draft: true
  mode: "replace"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Version }}-devel"

dockers_v2:
  - images:
      - "ghcr.io/{{ .Env.DOCKER_REPO_OWNER }}/infisical-cli"
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: docker/alpine

homebrew_casks:
  # `brew install YewFence/infisical-cli/infisical`
  # `brew install YewFence/infisical-cli/infisical@0.38.3-yewfix`
  - name: infisical
    alternative_names:
      - "infisical@{{ .Version }}"
    repository:
      owner: "{{ .Env.HOMEBREW_TAP_OWNER }}"
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: "YewFence"
      email: noreply@github.com
    directory: Casks
    homepage: "https://github.com/YewFence/infisical-cli"
    description: "Infisical CLI (yewfix fork)"
    binaries:
      - infisical
    manpages:
      - manpages/infisical.1.gz
    completions:
      bash: completions/infisical.bash
      zsh: completions/infisical.zsh
      fish: completions/infisical.fish
